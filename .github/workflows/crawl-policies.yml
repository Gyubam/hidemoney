name: 정책 자동 빌드

# 매일 KST 03:00 (UTC 18:00) + 수동 실행 가능
on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      crawl:
        description: '정부 API fresh fetch (true=data.go.kr에서 받아옴, false=기존 데이터에 enrich만)'
        required: false
        default: 'true'
      list_only:
        description: 'list_services만 fetch (true=빠른 풀빌드, false=detail까지 받음)'
        required: false
        default: 'true'
      enrich:
        description: 'Gemini Flash로 정규화·정련 (true/false). list_only=true면 자동 비활성'
        required: false
        default: 'false'
      limit:
        description: '--crawl 시 가져올 정책 수 (0=전체)'
        required: false
        default: '0'
      user_type:
        description: '사용자구분 필터 (콤마 분리 OR 매치). 빈 값=필터 없음. 예: 개인,가구'
        required: false
        default: '개인,가구'
      merge:
        description: '기존 데이터에 merge (true) 또는 덮어쓰기 (false). 증분 갱신 시 true'
        required: false
        default: 'true'

permissions:
  contents: write

concurrency:
  group: crawl-policies
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tools/requirements.txt

      - name: 의존성 설치
        run: pip install -r tools/requirements.txt

      - name: 정책 빌드 (정부 API fetch + Gemini 정규화)
        working-directory: tools
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.0-flash
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          CRAWL: ${{ github.event.inputs.crawl || 'true' }}
          LIST_ONLY: ${{ github.event.inputs.list_only || 'true' }}
          ENRICH: ${{ github.event.inputs.enrich || 'false' }}
          LIMIT: ${{ github.event.inputs.limit || '0' }}
          USER_TYPE: ${{ github.event.inputs.user_type || '개인,가구' }}
          MERGE: ${{ github.event.inputs.merge || 'true' }}
        shell: bash
        run: |
          args=(--limit "$LIMIT")
          if [ "$CRAWL" = "true" ]; then args+=(--crawl); fi
          if [ "$LIST_ONLY" = "true" ]; then args+=(--list-only); fi
          if [ "$ENRICH" = "true" ]; then args+=(--enrich); fi
          if [ -n "$USER_TYPE" ]; then args+=(--user-type "$USER_TYPE"); fi
          if [ "$MERGE" = "true" ]; then args+=(--merge); fi
          echo "Running: python build_policies.py ${args[*]}"
          python build_policies.py "${args[@]}"

      - name: 변경 있으면 커밋·푸시
        run: |
          if [ -n "$(git status --porcelain docs/policies.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/policies.json
            git commit -m "auto: 정책 데이터 갱신 $(date -u +%F)"
            git push
            echo "Changes pushed."
          else
            echo "No changes to commit."
          fi
