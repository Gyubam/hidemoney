name: 정책 자동 빌드

# 매일 KST 03:00 (UTC 18:00) + 수동 실행 가능
on:
  schedule:
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      enrich:
        description: 'Gemini Flash로 summary 정련 (true/false)'
        required: false
        default: 'true'

permissions:
  contents: write

concurrency:
  group: crawl-policies
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Python 3.11 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: tools/requirements.txt

      - name: 의존성 설치
        run: pip install -r tools/requirements.txt

      - name: 정책 빌드 (Gemini 정련 포함)
        working-directory: tools
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.0-flash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.enrich }}" = "false" ]; then
            python build_policies.py
          else
            python build_policies.py --enrich
          fi

      - name: 변경 있으면 커밋·푸시
        run: |
          if [ -n "$(git status --porcelain docs/policies.json)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/policies.json
            git commit -m "auto: 정책 데이터 갱신 $(date -u +%F)"
            git push
            echo "Changes pushed."
          else
            echo "No changes to commit."
          fi
